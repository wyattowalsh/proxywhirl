version: '3.8'

services:
  proxywhirl-api:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=registry,ref=ghcr.io/wyattowalsh/proxywhirl:latest
    image: proxywhirl-api:latest
    container_name: proxywhirl-api
    ports:
      - "8000:8000"
    environment:
      # Core Configuration
      - PROXYWHIRL_STRATEGY=round-robin
      - PROXYWHIRL_TIMEOUT=30
      - PROXYWHIRL_MAX_RETRIES=3
      
      # Authentication & Security
      - PROXYWHIRL_REQUIRE_AUTH=false
      # - PROXYWHIRL_API_KEY=your-secret-api-key-here
      
      # CORS Configuration
      - PROXYWHIRL_CORS_ORIGINS=http://localhost:3000,http://localhost:8000
      
      # Database Storage
      - PROXYWHIRL_STORAGE_PATH=/data/proxies.db
      
      # Redis Caching
      - PROXYWHIRL_REDIS_URL=redis://redis:6379/0
      
      # Logging
      - PROXYWHIRL_LOG_LEVEL=INFO
      
      # Rate Limiting
      - PROXYWHIRL_RATE_LIMIT_ENABLED=true
      - PROXYWHIRL_RATE_LIMIT_REQUESTS=100
      - PROXYWHIRL_RATE_LIMIT_PERIOD=60
      
      # Monitoring
      - PROXYWHIRL_PROMETHEUS_ENABLED=true
      - PROXYWHIRL_PROMETHEUS_PORT=9000
    
    volumes:
      # Persistent storage for proxy pool (SQLite)
      - proxywhirl-data:/data
      
      # Development: Mount source code for live reloading (uncomment for dev mode)
      # - ./proxywhirl:/app/proxywhirl:ro
      
      # Optional: Mount custom configuration
      # - ./config:/app/config:ro
    
    restart: unless-stopped
    
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ready', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    
    networks:
      - proxywhirl-network
    
    depends_on:
      - redis
    
    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis cache for proxy rotation state and caching
  redis:
    image: redis:7-alpine
    container_name: proxywhirl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-dev-pass}
    networks:
      - proxywhirl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Optional: PostgreSQL for advanced persistence
  postgres:
    image: postgres:16-alpine
    container_name: proxywhirl-postgres
    environment:
      POSTGRES_DB: proxywhirl
      POSTGRES_USER: ${DB_USER:-proxywhirl}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-proxywhirl-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - proxywhirl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-proxywhirl}"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M

  # Prometheus metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: proxywhirl-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./examples/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - proxywhirl-network
    depends_on:
      - proxywhirl-api
    restart: unless-stopped

  # Grafana dashboards for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: proxywhirl-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - proxywhirl-network
    restart: unless-stopped

  # Jaeger distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: proxywhirl-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "6831:6831/udp"  # Jaeger agent
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - jaeger-data:/badger/data
    networks:
      - proxywhirl-network
    restart: unless-stopped

volumes:
  proxywhirl-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  jaeger-data:
    driver: local

networks:
  proxywhirl-network:
    driver: bridge
