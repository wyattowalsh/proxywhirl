global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: proxywhirl
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alert-rules.yml'

scrape_configs:
  - job_name: 'proxywhirl'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    scheme: http

  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    scrape_interval: 30s

  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:5432']
    scrape_interval: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
