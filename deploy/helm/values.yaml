replicaCount: 3

image:
  repository: proxywhirl
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

config:
  auth:
    requireAuth: true
    publicMetrics: false
  logging:
    level: INFO

secrets:
  create: false
  existingSecret: proxywhirl-secrets
  encryptionKey: ""
  apiKey: ""

persistence:
  enabled: true
  mountPath: /data

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.proxywhirl.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: proxywhirl-tls
      hosts:
        - api.proxywhirl.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

postgresql:
  enabled: true
  auth:
    username: proxywhirl
    existingSecret: proxywhirl-postgresql
    database: proxywhirl

redis:
  enabled: true
  host: redis
  port: 6379
  database: 0
  auth:
    enabled: false

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
