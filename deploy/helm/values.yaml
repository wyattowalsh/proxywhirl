replicaCount: 3

image:
  repository: proxywhirl
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.proxywhirl.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: proxywhirl-tls
      hosts:
        - api.proxywhirl.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

postgresql:
  enabled: true
  auth:
    username: proxywhirl
    password: secretpassword
    database: proxywhirl

redis:
  enabled: true
  auth:
    enabled: false

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
