{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.existingSecret | default (printf "%s-secrets" (include "proxywhirl.fullname" .)) }}
  labels:
    {{- include "proxywhirl.labels" . | nindent 4 }}
type: Opaque
stringData:
  encryption-key: {{ required "Set secrets.encryptionKey or use secrets.existingSecret" .Values.secrets.encryptionKey | quote }}
  api-key: {{ required "Set secrets.apiKey or use secrets.existingSecret" .Values.secrets.apiKey | quote }}
{{- end }}
