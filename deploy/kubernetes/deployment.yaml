apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxywhirl
  namespace: proxywhirl
  labels:
    app: proxywhirl
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: proxywhirl
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: proxywhirl
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: proxywhirl
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: proxywhirl
        image: ghcr.io/wyattowalsh/proxywhirl:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        - name: PROXYWHIRL_LOG_LEVEL
          value: "INFO"
        - name: PROXYWHIRL_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: proxywhirl-secrets
              key: encryption-key
        - name: PROXYWHIRL_API_KEY
          valueFrom:
            secretKeyRef:
              name: proxywhirl-secrets
              key: api-key
        - name: PROXYWHIRL_REQUIRE_AUTH
          value: "true"
        - name: PROXYWHIRL_PUBLIC_METRICS
          value: "true"
        - name: PROXYWHIRL_STORAGE_PATH
          value: "/data/proxywhirl.db"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /api/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        volumeMounts:
        - name: data
          mountPath: /data
        - name: tmp
          mountPath: /tmp
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: proxywhirl-data
      - name: tmp
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - proxywhirl
              topologyKey: kubernetes.io/hostname
