apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: proxywhirl
  namespace: proxywhirl
spec:
  podSelector:
    matchLabels:
      app: proxywhirl
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: proxywhirl
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
