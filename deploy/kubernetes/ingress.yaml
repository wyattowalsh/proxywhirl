apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxywhirl
  namespace: proxywhirl
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - proxywhirl.example.com
    secretName: proxywhirl-tls
  rules:
  - host: proxywhirl.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: proxywhirl
            port:
              number: 80
