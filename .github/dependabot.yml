# Dependabot configuration for automated dependency updates
version: 2
updates:
  # Python dependencies via pip (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "python"
      - "automated"
    reviewers:
      - "wyattowalsh"
    assignees:
      - "wyattowalsh"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      # Group critical security updates (fast-track)
      python-security-critical:
        patterns:
          - "*"
        update-types:
          - "patch"
        dependency-type: "production"

      # Group minor and patch updates together
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

      # Major versions need manual review
      python-major:
        patterns:
          - "*"
        update-types:
          - "major"

  # Web dependencies via npm/pnpm (web/package.json and web/pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "/"
    labels:
      - "dependencies"
      - "javascript"
      - "web"
      - "automated"
    reviewers:
      - "wyattowalsh"
    assignees:
      - "wyattowalsh"
    commit-message:
      prefix: "chore(deps-web)"
      prefix-development: "chore(deps-web)"
      include: "scope"
    groups:
      web-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

      web-major:
        patterns:
          - "*"
        update-types:
          - "major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    reviewers:
      - "wyattowalsh"
    commit-message:
      prefix: "chore(ci)"
    groups:
      # Group GitHub Actions updates
      github-actions-all:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
          - "major"
