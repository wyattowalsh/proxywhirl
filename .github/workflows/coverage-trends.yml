name: Coverage Trends Tracking

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  coverage-trends:
    name: Track Coverage Trends
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Download coverage artifacts
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: ci.yml
          branch: main
          name: coverage-data
          path: coverage-artifacts/

      - name: Parse and store coverage data
        id: coverage
        run: |
          uv pip install requests
          if [ -f coverage-artifacts/coverage.json ]; then
            COVERAGE=$(python3 -c "import json; data=json.load(open('coverage-artifacts/coverage.json')); print(data.get('totals', {}).get('percent_covered', 0))")
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            
            # Store timestamp
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
            
            # Store in artifacts for trending
            mkdir -p .coverage-history
            echo "{\"timestamp\": \"$TIMESTAMP\", \"coverage\": $COVERAGE, \"commit\": \"$GITHUB_SHA\"}" >> .coverage-history/coverage-$(date +%s).json
          else
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate coverage trend graph
        if: always()
        run: |
          uv pip install matplotlib pandas
          python3 << 'EOF'
          import json
          import glob
          from datetime import datetime
          import matplotlib.pyplot as plt
          import pandas as pd
          
          # Collect all coverage data
          coverage_files = glob.glob('.coverage-history/coverage-*.json')
          data = []
          for f in sorted(coverage_files):
              try:
                  with open(f) as file:
                      d = json.load(file)
                      d['timestamp'] = datetime.fromisoformat(d['timestamp'])
                      data.append(d)
              except:
                  pass
          
          if data:
              df = pd.DataFrame(data)
              df = df.sort_values('timestamp')
              
              plt.figure(figsize=(12, 6))
              plt.plot(df['timestamp'], df['coverage'], marker='o', linewidth=2)
              plt.xlabel('Date')
              plt.ylabel('Coverage %')
              plt.title('Code Coverage Trend')
              plt.grid(True, alpha=0.3)
              plt.xticks(rotation=45)
              plt.tight_layout()
              plt.savefig('coverage-trend.png', dpi=100)
          EOF

      - name: Create coverage badge
        run: |
          python3 << 'EOF'
          import json
          coverage = ${{ steps.coverage.outputs.coverage }}
          
          if coverage >= 80:
              color = "green"
          elif coverage >= 70:
              color = "yellow"
          elif coverage >= 60:
              color = "orange"
          else:
              color = "red"
          
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100" height="20">
            <linearGradient id="b" x2="0" y2="100%">
              <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
              <stop offset="1" stop-opacity=".1"/>
            </linearGradient>
            <mask id="a">
              <rect width="100" height="20" rx="3" fill="#fff"/>
            </mask>
            <g mask="url(#a)">
              <rect width="60" height="20" fill="#555"/>
              <rect x="60" width="40" height="20" fill="{color}"/>
              <rect width="100" height="20" fill="url(#b)"/>
            </g>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="30" y="15" fill="#010101" fill-opacity=".3">coverage</text>
              <text x="30" y="14">coverage</text>
              <text x="79" y="15" fill="#010101" fill-opacity=".3">{coverage:.1f}%</text>
              <text x="79" y="14">{coverage:.1f}%</text>
            </g>
          </svg>'''
          
          import os
          os.makedirs('.github/badges', exist_ok=True)
          with open('.github/badges/coverage.svg', 'w') as f:
              f.write(svg)
          EOF

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-trends
          path: |
            .coverage-history/
            coverage-trend.png
            .github/badges/coverage.svg
          retention-days: 90

      - name: Comment PR with coverage report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = ${{ steps.coverage.outputs.coverage }};
            const timestamp = "${{ steps.coverage.outputs.timestamp }}";
            const comment = `## 📊 Coverage Report
            **Current Coverage:** ${coverage.toFixed(1)}%
            **Timestamp:** ${timestamp}
            
            ✅ View detailed coverage trends in [artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
