name: Coverage Trends Tracking

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  coverage-trends:
    name: Track Coverage Trends
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download coverage artifacts
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: ci.yml
          branch: main
          name: coverage-data
          path: coverage-artifacts/

      - name: Parse coverage data
        id: coverage
        run: |
          if [ -f coverage-artifacts/coverage.json ]; then
            COVERAGE=$(python3 -c "import json; data=json.load(open('coverage-artifacts/coverage.json')); print(data.get('totals', {}).get('percent_covered', 0))")
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Coverage: $COVERAGE%"
          else
            echo "coverage=0" >> $GITHUB_OUTPUT
          fi

      - name: Create coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: |
            .github/badges/coverage.svg
          retention-days: 30

      - name: Comment PR with coverage change
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = ${{ steps.coverage.outputs.coverage }};
            const comment = `## Coverage Report
            Current coverage: **${coverage}%**
            
            View detailed coverage report in artifacts.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
