name: Security Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC

jobs:
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      
      - name: Run Bandit (Python security linter)
        run: |
          uv pip install bandit
          bandit -r proxywhirl/ -f json -o bandit-report.json || true
          bandit -r proxywhirl/ -f txt
      
      - name: Run Safety (dependency vulnerabilities)
        run: |
          uv pip install safety
          safety check --json > safety-report.json || true
          safety check
      
      - name: Run Semgrep (semantic code scanning)
        run: |
          uv pip install semgrep
          semgrep --config=p/security-audit --json -o semgrep-report.json proxywhirl/ || true
      
      - name: Check for secrets (detect-secrets)
        run: |
          uv pip install detect-secrets
          detect-secrets scan --all-files --baseline .secrets.baseline || true
      
      - name: Dependency audit (pip-audit)
        run: |
          uv pip install pip-audit
          pip-audit --desc --output=json > pip-audit-report.json || true
          pip-audit --desc
      
      - name: Archive security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json
            pip-audit-report.json
          retention-days: 90
      
      - name: Security summary
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "See security reports in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tools Run:" >> $GITHUB_STEP_SUMMARY
          echo "- Bandit (code security)" >> $GITHUB_STEP_SUMMARY
          echo "- Safety (dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "- Semgrep (semantic patterns)" >> $GITHUB_STEP_SUMMARY
          echo "- Detect-secrets (credential detection)" >> $GITHUB_STEP_SUMMARY
          echo "- Pip-audit (package vulnerabilities)" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if critical issues found
        run: |
          if [ -s bandit-report.json ]; then
            if grep -q '"severity": "HIGH"' bandit-report.json; then
              echo "Critical security issues found!"
              exit 1
            fi
          fi
