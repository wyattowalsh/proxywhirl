name: Auto Version Bump

on:
  push:
    branches:
      - main
    paths:
      - 'proxywhirl/**'
      - 'tests/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore(release)'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog using commitizen
          uv run cz changelog --dry-run > /tmp/changelog.txt 2>&1 || true
          cat /tmp/changelog.txt
          
          # Extract version
          VERSION=$(grep -m1 'version' /tmp/changelog.txt | head -1 | awk '{print $NF}' || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump version with commitizen
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Perform version bump - this will auto-generate CHANGELOG.md
          uv run cz bump --changelog || {
            echo "No changes to bump version"
            exit 0
          }
          
          # Get new version
          NEW_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Push changes and tag
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(release): bump version $(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')" --no-verify || true
            git push
            
            NEW_VERSION=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            git tag -a "v$NEW_VERSION" -m "Release v$NEW_VERSION" || true
            git push origin "v$NEW_VERSION" || true
          fi
