name: CD

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Install build dependencies
      run: |
        uv venv
        uv pip install build twine

    - name: Build package
      run: |
        uv run python -m build

    - name: Check package
      run: |
        uv run twine check dist/*
    
    - name: Publish to TestPyPI
      if: github.event_name == 'workflow_dispatch'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
      run: |
        uv run twine upload --repository testpypi dist/*

    - name: Publish to PyPI (Canary)
      if: github.event_name == 'release' && contains(github.ref, 'canary')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        uv run twine upload dist/* --verbose

    - name: Publish to PyPI (Stable)
      if: github.event_name == 'release' && !contains(github.ref, 'canary')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        uv run twine upload dist/*

  canary-validation:
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.ref, 'canary')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
    
    - name: Install canary release
      run: |
        uv pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ proxywhirl
    
    - name: Run integration tests
      run: |
        uv run pytest tests/integration/ -q --tb=short
