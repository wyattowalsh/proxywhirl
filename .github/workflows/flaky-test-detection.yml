name: Flaky Test Detection

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
  pull_request:
    branches: [main, develop]

jobs:
  flaky-detection:
    name: Detect Flaky Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      
      - name: Install dependencies
        run: uv sync
      
      - name: Run tests 3 times (Flaky Detection)
        id: flaky
        run: |
          mkdir -p .flaky-reports
          
          # Run 1
          echo "::group::Run 1"
          uv run pytest tests/unit tests/integration \
            -v --tb=short --json-report --json-report-file=.flaky-reports/run1.json || RUN1_EXIT=$?
          echo "::endgroup::"
          RUN1_EXIT=${RUN1_EXIT:-0}
          
          # Run 2
          echo "::group::Run 2"
          uv run pytest tests/unit tests/integration \
            -v --tb=short --json-report --json-report-file=.flaky-reports/run2.json || RUN2_EXIT=$?
          echo "::endgroup::"
          RUN2_EXIT=${RUN2_EXIT:-0}
          
          # Run 3
          echo "::group::Run 3"
          uv run pytest tests/unit tests/integration \
            -v --tb=short --json-report --json-report-file=.flaky-reports/run3.json || RUN3_EXIT=$?
          echo "::endgroup::"
          RUN3_EXIT=${RUN3_EXIT:-0}
          
          echo "run1_exit=$RUN1_EXIT" >> $GITHUB_OUTPUT
          echo "run2_exit=$RUN2_EXIT" >> $GITHUB_OUTPUT
          echo "run3_exit=$RUN3_EXIT" >> $GITHUB_OUTPUT
      
      - name: Analyze flaky tests
        if: always()
        run: |
          python3 << 'ANALYSIS'
          import json
          import os
          from collections import defaultdict
          
          flaky_tests = defaultdict(list)
          run_results = {}
          
          # Parse results from all 3 runs
          for run_num in [1, 2, 3]:
              report_file = f'.flaky-reports/run{run_num}.json'
              if os.path.exists(report_file):
                  with open(report_file) as f:
                      data = json.load(f)
                      run_results[f'run{run_num}'] = {
                          'passed': len([t for t in data.get('tests', []) if t['outcome'] == 'passed']),
                          'failed': len([t for t in data.get('tests', []) if t['outcome'] == 'failed']),
                          'skipped': len([t for t in data.get('tests', []) if t['outcome'] == 'skipped'])
                      }
                      
                      # Track test outcomes
                      for test in data.get('tests', []):
                          test_name = test['nodeid']
                          outcome = test['outcome']
                          if test_name not in run_results:
                              run_results[test_name] = {}
                          run_results[test_name][f'run{run_num}'] = outcome
          
          # Find flaky tests (inconsistent outcomes)
          for test_name, outcomes in run_results.items():
              if isinstance(outcomes, dict) and 'run1' in outcomes:
                  outcomes_list = [outcomes.get(f'run{i}') for i in [1, 2, 3]]
                  if len(set(outcomes_list)) > 1:  # Different outcomes across runs
                      flaky_tests[test_name] = outcomes_list
          
          # Generate report
          print("\n## Flaky Test Report\n")
          if flaky_tests:
              print(f"🚨 Found {len(flaky_tests)} potentially flaky tests:\n")
              for test, outcomes in flaky_tests.items():
                  print(f"- `{test}`")
                  print(f"  - Run 1: {outcomes[0]}")
                  print(f"  - Run 2: {outcomes[1]}")
                  print(f"  - Run 3: {outcomes[2]}\n")
          else:
              print("✅ No flaky tests detected!")
          
          # Save flaky test list
          with open('.flaky-reports/flaky-tests.json', 'w') as f:
              json.dump(list(flaky_tests.keys()), f, indent=2)
          
          ANALYSIS
      
      - name: Mark flaky tests
        if: always()
        run: |
          if [ -f .flaky-reports/flaky-tests.json ]; then
            python3 << 'MARK'
            import json
            
            with open('.flaky-reports/flaky-tests.json') as f:
              flaky = json.load(f)
            
            if flaky:
              # Generate pytest.ini with flaky marker
              marker_content = "[pytest]\nmarkers =\n    flaky: marks tests as flaky (inconsistent results)\n"
              with open('pytest.ini', 'a') as f:
                f.write("\n" + marker_content)
              
              print(f"Marked {len(flaky)} tests as potentially flaky")
            MARK
          fi
      
      - name: Upload flaky reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-reports
          path: .flaky-reports/
          retention-days: 30
      
      - name: Comment on PR (Flaky Tests Found)
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('.flaky-reports/flaky-tests.json') ?
              JSON.parse(fs.readFileSync('.flaky-reports/flaky-tests.json', 'utf8')) : [];
            
            if (report.length > 0) {
              const comment = `## ⚠️ Flaky Tests Detected
              
              This PR introduced or contains ${report.length} flaky test(s):
              
              ${report.map(t => `- \`${t}\``).join('\n')}
              
              These tests had inconsistent results across 3 runs. Please investigate and fix before merging.
              
              [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
