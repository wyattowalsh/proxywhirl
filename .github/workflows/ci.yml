name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "enhancement/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  STEP_TIMING_ENABLED: "true"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Install dependencies
        run: |
          uv venv --clear --python 3.11
          uv pip install -e ".[dev]"

      - name: Run Ruff linter
        id: lint
        run: |
          echo "::group::Lint Results"
          uv run ruff check . || exit 1
          echo "::endgroup::"

      - name: Run Ruff formatter check
        id: format
        run: |
          echo "::group::Format Check"
          uv run ruff format --check . || exit 1
          echo "::endgroup::"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Install dependencies
        run: |
          uv venv --clear --python 3.11
          uv pip install -e ".[dev]"

      - name: Run type checker
        id: typecheck
        run: |
          echo "::group::Type Check Results"
          uv run ty check proxywhirl/ || exit 1
          echo "::endgroup::"

  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for commit history

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Install commitizen
        run: uv pip install commitizen

      - name: Validate commit messages
        run: |
          # Check all commits in the PR
          uv run cz check --rev-range origin/${{ github.base_ref }}..HEAD

  test:
    name: Test - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN_PRESENT: ${{ secrets.CODECOV_TOKEN != '' }}
      HYPOTHESIS_PROFILE: ci
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Cache pytest
        uses: actions/cache@v6
        with:
          path: |
            .pytest_cache
            .coverage*
            htmlcov
          key: pytest-${{ runner.os }}-py${{ matrix.python-version }}-${{ github.sha }}
          restore-keys: |
            pytest-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          uv venv --clear --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      - name: Run non-slow tests
        id: test
        run: |
          echo "::group::Test Results"
          uv run pytest tests/unit/ tests/integration/ tests/property/ -m "not slow and not stress" --timeout=120 -v
          echo "::endgroup::"

      - name: Check coverage threshold
        if: matrix.python-version == '3.11'
        run: |
          echo "::group::Coverage Check"
          uv run pytest \
            tests/unit/ \
            tests/integration/ \
            tests/property/ \
            -m "not slow and not stress" \
            --cov=proxywhirl.models \
            --cov=proxywhirl.strategies \
            --cov=proxywhirl.rotator \
            --cov=proxywhirl.storage \
            --cov=proxywhirl.utils \
            --cov=proxywhirl.fetchers \
            --cov=proxywhirl.sources \
            --cov=proxywhirl.exceptions \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=json:coverage.json \
            --cov-fail-under=90 \
            --timeout=120 \
            -q \
            --tb=line || (echo "Code coverage is below 90% threshold" && exit 1)
          echo "::endgroup::"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: matrix.python-version == '3.11' && env.CODECOV_TOKEN_PRESENT == 'true'
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11'
        with:
          name: coverage-data
          path: coverage.json
          retention-days: 7

  test-all-extras:
    name: Test with all extras - Python 3.11
    runs-on: ubuntu-latest
    # Only run on PRs and main to avoid redundant test runs
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Cache pytest
        uses: actions/cache@v6
        with:
          path: |
            .pytest_cache
            .coverage*
            htmlcov
          key: pytest-extras-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            pytest-extras-${{ runner.os }}-

      - name: Install dependencies with all extras
        run: |
          uv venv --clear --python 3.11
          uv pip install -e ".[all,dev]"

      - name: Run tests
        run: uv run pytest tests/unit/ tests/integration/ tests/property/ -m "not slow and not stress" --timeout=120 -v

  benchmark:
    name: Benchmark Performance Regression
    runs-on: ubuntu-latest
    # Only run benchmarks on PRs and main, not feature branches
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required to access baseline from git

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Cache benchmark results
        uses: actions/cache@v6
        with:
          path: .benchmarks
          key: benchmarks-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            benchmarks-${{ runner.os }}-

      - name: Install dependencies
        run: |
          uv venv --clear --python 3.11
          uv pip install -e ".[dev]"

      - name: Run benchmarks with regression check
        id: benchmark
        run: |
          echo "::group::Benchmark Results"
          benchmark_args=(--benchmark-only)
          if [ -d .benchmarks ] && find .benchmarks -type f -name "*0001*.json" | grep -q .; then
            benchmark_args+=(--benchmark-compare=0001)
          else
            echo "No benchmark baseline matching 0001 found; recording results without comparison."
          fi
          uv run pytest tests/benchmarks/ "${benchmark_args[@]}" || true
          echo "::endgroup::"

      - name: Parse benchmark results
        if: always()
        id: parse-benchmarks
        run: |
          uv run python -c "
          import json, os
          bench_files = [f for f in os.listdir('.benchmarks') if f.startswith('.benchmarksession') and f.endswith('.json')]
          if bench_files:
            with open(os.path.join('.benchmarks', sorted(bench_files)[-1])) as f:
              results = json.load(f)
              print('::group::Benchmark Summary')
              for bench in results.get('benchmarks', []):
                print(f\"  {bench['name']}: {bench['stats']['mean']:.6f}s\")
              print('::endgroup::')
          " || true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: |
            .benchmarks/
            benchmark-histogram*
          if-no-files-found: ignore

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Install build dependencies
        run: |
          uv venv --clear --python 3.11
          uv pip install --python .venv/bin/python build

      - name: Build package
        run: .venv/bin/python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.8.22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: uv sync --locked --python 3.11

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Generate documentation references
        run: pnpm --dir web run docs:generate

      - name: Verify generated docs are committed
        run: git diff --exit-code -- web/content/docs/generated web/content/generated

      - name: Lint web documentation app
        run: pnpm --dir web run lint

      - name: Test web documentation app
        run: pnpm --dir web run test:run

      - name: Build documentation site
        run: pnpm --dir web run build

      - name: Report workflow timing
        if: always()
        run: |
          {
            echo "## CI Workflow Timing"
            echo ""
            echo "All jobs have completed. Check individual job logs for step-level timings."
          } >> "$GITHUB_STEP_SUMMARY"
