name: Workflow Timing Analysis

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  analyze-timing:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'skipped'
    
    steps:
      - name: Download workflow logs
        run: |
          gh run download ${{ github.event.workflow_run.id }} -D logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Extract and analyze timing
        run: |
          echo "## Workflow Timing Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Workflow Run: ${{ github.event.workflow_run.name }}" >> $GITHUB_STEP_SUMMARY
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Step Durations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Parse timing data from logs
          for log in logs/*.txt; do
            if [ -f "$log" ]; then
              # Extract timing info (this is job-level timing)
              echo "- $(basename $log): See detailed logs" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Total Duration" >> $GITHUB_STEP_SUMMARY
          echo "${{ github.event.workflow_run.created_at }} to ${{ github.event.workflow_run.updated_at }}" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: rm -rf logs
