name: Release to PyPI

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Custom version (only if version_bump is "custom")'
        required: false
        type: string

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    # Required for trusted publishing (OIDC)
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.8.22"

      - name: Install dependencies
        run: |
          uv venv --clear --python 3.11
          uv pip install -e ".[dev]"
          uv pip install build twine

      - name: Get current version
        id: current_version
        run: |
          CURRENT=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT"

      - name: Calculate new version
        id: new_version
        env:
          CURRENT_VERSION: ${{ steps.current_version.outputs.version }}
          VERSION_BUMP: ${{ inputs.version_bump }}
          CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          import os
          import sys

          from packaging.version import InvalidVersion, Version


          def fail(message: str) -> None:
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)


          def pep440_version(value: str, field: str) -> Version:
              if not value:
                  fail(f"{field} must not be empty.")
              try:
                  version = Version(value)
              except InvalidVersion:
                  fail(f"{field} must be a valid PEP 440 version.")
              normalized = str(version)
              if normalized != value:
                  fail(f"{field} must use normalized PEP 440 form: {normalized}")
              return version


          current = pep440_version(os.environ["CURRENT_VERSION"], "Current version")
          bump = os.environ["VERSION_BUMP"]
          custom = os.environ.get("CUSTOM_VERSION", "").strip()

          if bump == "custom":
              version_text = str(pep440_version(custom, "custom_version"))
          else:
              if bump not in {"major", "minor", "patch"}:
                  fail("version_bump must be one of: major, minor, patch, custom.")
              release = list(current.release)
              release.extend([0] * (3 - len(release)))
              major, minor, patch = release[:3]
              if bump == "major":
                  version_text = f"{major + 1}.0.0"
              elif bump == "minor":
                  version_text = f"{major}.{minor + 1}.0"
              else:
                  version_text = f"{major}.{minor}.{patch + 1}"
              pep440_version(version_text, "Calculated version")

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"version={version_text}\n")
          print(f"New version: {version_text}")
          PY

      - name: Update version in pyproject.toml
        env:
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" pyproject.toml
          # Also update version in __init__.py if it exists
          if [ -f "proxywhirl/__init__.py" ]; then
            sed -i "s/__version__ = \".*\"/__version__ = \"$NEW_VERSION\"/" proxywhirl/__init__.py
          fi
          echo "Updated to version $NEW_VERSION"
          grep -m1 '^version = ' pyproject.toml

      - name: Run tests
        run: uv run pytest -m "not slow" -q

      - name: Build package
        run: uv run python -m build

      - name: Check package
        run: uv run twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) - no API token needed
        # Configure at: https://pypi.org/manage/project/proxywhirl/settings/publishing/

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml proxywhirl/__init__.py 2>/dev/null || git add pyproject.toml
          git commit -m "chore(release): bump version to ${{ steps.new_version.outputs.version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.new_version.outputs.version }}
          name: Release v${{ steps.new_version.outputs.version }}
          body: |
            ## proxywhirl v${{ steps.new_version.outputs.version }}

            ### Changes
            See [CHANGELOG](https://github.com/wyattowalsh/proxywhirl/blob/main/docs/CHANGELOG.md) for details.

            ### Installation
            ```bash
            pip install proxywhirl==${{ steps.new_version.outputs.version }}
            ```
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz
