name: Release Automation

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      
      - name: Install dependencies
        run: uv sync
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF" >> $GITHUB_OUTPUT
      
      - name: Generate changelog
        run: |
          uv run python3 << 'EOSCRIPT'
          import subprocess
          import re
          
          # Get last tag
          result = subprocess.run(
              ['git', 'describe', '--tags', '--abbrev=0', 'HEAD~1'],
              capture_output=True,
              text=True
          )
          prev_tag = result.stdout.strip()
          
          # Get commits since last tag
          result = subprocess.run(
              ['git', 'log', f'{prev_tag}..HEAD', '--oneline', '--format=%B'],
              capture_output=True,
              text=True
          )
          commits = result.stdout
          
          # Extract features, fixes, breaking changes
          features = []
          fixes = []
          breaking = []
          
          for commit in commits.split('\n'):
              if 'feat:' in commit or 'feat(' in commit:
                  features.append(commit)
              elif 'fix:' in commit or 'fix(' in commit:
                  fixes.append(commit)
              elif 'BREAKING' in commit or '!' in commit:
                  breaking.append(commit)
          
          # Generate changelog entry
          with open('CHANGELOG_ENTRY.md', 'w') as f:
              f.write('## [${{ steps.version.outputs.version }}] - ')
              f.write(subprocess.run(['date', '+%Y-%m-%d'], capture_output=True, text=True).stdout.strip())
              f.write('\n\n')
              
              if breaking:
                  f.write('### ⚠️ BREAKING CHANGES\n\n')
                  for item in breaking[:5]:
                      f.write(f'- {item}\n')
                  f.write('\n')
              
              if features:
                  f.write('### ✨ Features\n\n')
                  for item in features[:10]:
                      f.write(f'- {item}\n')
                  f.write('\n')
              
              if fixes:
                  f.write('### 🐛 Fixes\n\n')
                  for item in fixes[:10]:
                      f.write(f'- {item}\n')
          
          print("✓ Changelog generated")
          EOSCRIPT
      
      - name: Build distribution packages
        run: |
          uv run python3 -m build
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          body_path: CHANGELOG_ENTRY.md
          draft: false
          prerelease: false
          files: |
            dist/proxywhirl-*.whl
            dist/proxywhirl-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to PyPI
        run: |
          uv run twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      
      - name: Publish to GitHub Packages
        run: |
          uv run twine upload --repository-url https://npm.pkg.github.com/ dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      
      - name: Notify release
        run: |
          echo "## Release ${{ steps.version.outputs.version }} Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- PyPI: https://pypi.org/project/proxywhirl/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
