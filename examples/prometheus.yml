global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'proxywhirl-monitor'

scrape_configs:
  - job_name: 'proxywhirl-api'
    static_configs:
      - targets: ['proxywhirl-api:8000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: '/metrics'
